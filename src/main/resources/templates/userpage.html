<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min side</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">
        <a th:href="@{/}">WishList</a>
    </div>
    <ul class="navbar-links">
        <li><a th:href="@{/}">Hjem</a></li>
        <li><a th:href="@{/logout}" class="btn-nav">Log ud</a></li>
    </ul>
</nav>

<div class="userpage-wrapper">

    <!-- Profile card -->
    <div class="card user-card">
        <div class="card-header">
            <h1 th:text="${user.name}">Brugernavn</h1>
            <p th:text="${user.email}">email@example.com</p>
        </div>
    </div>

    <!-- Wishlist section -->
    <div class="wishlist-section">

        <div class="section-header">
            <h2>Mine ønskesedler</h2>
            <a th:href="@{/createWishList}" class="btn btn-primary">+ Ny ønskeseddel</a>
        </div>

        <!-- Wishlist grid -->
        <div class="wishlist-grid" th:if="${!#lists.isEmpty(wishList)}">
            <div class="wishlist-card" th:each="wl : ${wishList}">
                <a th:href="@{/WishList(wishlistId=${wl.id})}" style="text-decoration: none;">
                    <h3 th:text="${wl.name}">Ønskeseddel navn</h3>
                    <p th:text="${wl.description}">Beskrivelse</p>
                </a>
            </div>
        </div>

        <!-- Empty state -->
        <div class="placeholder-card" th:if="${#lists.isEmpty(wishList)}">
            <p>Du har ingen ønskesedler endnu. Opret din første!</p>
            <br/>
            <a th:href="@{/createWishList}" class="btn btn-primary" style="width: auto; padding: 10px 24px;">
                Opret ønskeseddel
            </a>
        </div>

    </div>

</div>

</body>
</html>
