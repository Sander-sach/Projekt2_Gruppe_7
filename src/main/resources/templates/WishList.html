<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeseddel</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">
        <a th:href="@{/}">WishList</a>
    </div>
    <ul class="navbar-links">
        <li><a th:href="@{/userpage}">Min side</a></li>
        <li><a th:href="@{/logout}" class="btn-nav">Log ud</a></li>
    </ul>
</nav>

<div class="userpage-wrapper">

    <div class="wishlist-section">

        <div class="section-header">
            <h2 th:text="${WishList != null} ? ${WishList.name} : 'Ønskeseddel'">Ønskeseddel</h2>
            <a th:href="@{/createWish(wishlistId=${WishListId})}" class="btn btn-primary">+ Tilføj ønske</a>
        </div>

        <!-- Wishes grid -->
        <div class="wishlist-grid" th:if="${!#lists.isEmpty(wishes)}">
            <div class="wishlist-card" th:each="wish : ${wishes}">

                <h3 th:text="${wish.itemName}">Ønske navn</h3>
                <p th:text="${wish.description}">Beskrivelse</p>

                <p th:if="${wish.price != null}">
                    Pris: <span th:text="${wish.price} + ' kr.'">0 kr.</span>
                </p>

                <div style="display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;">

                    <!-- Rediger -->
                    <a th:href="@{/editWish(wishId=${wish.id})}" class="btn">Rediger</a>

                    <!-- Slet -->
                    <form th:action="@{/deleteWish}" method="post"
                          onsubmit="return confirm('Er du sikker på at du vil slette dette ønske?')">
                        <input type="hidden" name="wishId" th:value="${wish.id}">
                        <input type="hidden" name="wishlistId" th:value="${WishListId}">
                        <button type="submit" class="btn" style="color: #dc2626;">Slet</button>
                    </form>

                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="placeholder-card" th:if="${#lists.isEmpty(wishes)}">
            <p>Ingen ønsker på denne liste endnu</p>
            <br/>
            <a th:href="@{/createWish(wishlistId=${WishListId})}" class="btn btn-primary"
               style="width: auto; padding: 10px 24px;">
                Tilføj første ønske
            </a>
        </div>

        <div class="card-footer" style="margin-top: 24px;">
            <a th:href="@{/WishList(userId=${WishList.userId})}">← Tilbage til mine ønskesedler</a>
        </div>

    </div>

</div>

</body>
</html>
