<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Opret konto</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="page-wrapper">
    <div class="card">

        <div class="card-header">
            <h1>Opret konto</h1>
            <p>Udfyld felterne nedenfor</p>
        </div>

        <form th:action="@{/frontpage/register}" method="post">

            <div class="form-group">
                <label>Navn</label>
                <input type="text" name="name" placeholder="Dit navn" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="din@email.dk" required>
            </div>

            <div class="form-group">
                <label>Adgangskode</label>
                <input type="password" name="password" placeholder="Mindst 8 tegn" required>
            </div>

            <button class="btn btn-primary">Opret konto</button>
        </form>

        <div class="card-footer">
            <p>Har du en konto?
                <a th:href="@{/frontpage/loginform}">Log ind</a>
            </p>
        </div>

    </div>
</div>

</body>
</html>
